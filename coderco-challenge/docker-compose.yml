version: "3.8"

services:
  web:
    build: .
    expose:
      - "5002"
    depends_on:
      - redis
    environment:
     - REDIS_HOST=redis
     - REDIS_PORT=6379

  redis:
    image: redis
    command: redis-server --appendonly yes
    volumes:
       - redis-data:/data

  nginx:
      image: nginx
      ports:
        - "5002:80"
      volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:
        - web

volumes:
   redis-data:
